<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="'@' + ${username} + ' – TwitStock'">User – TwitStock</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">

    <header class="site-header">
        <a href="/" class="back-link">← Search</a>
        <h1 th:text="'@' + ${username}">@username</h1>
    </header>

    <!-- Error banner -->
    <div class="alert alert-error" th:if="${error}" th:text="${error}"></div>

    <main th:if="${analysis}">

        <!-- Summary stats -->
        <section class="stats-row">
            <div class="stat-card">
                <span class="stat-value" th:text="${analysis.tweetCount}">0</span>
                <span class="stat-label">Tweets analysed</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" th:text="${analysis.ideas.size()}">0</span>
                <span class="stat-label">Ideas found</span>
            </div>
            <div class="stat-card">
                <span class="stat-value" th:text="${analysis.distinctTickerCount()}">0</span>
                <span class="stat-label">Distinct tickers</span>
            </div>
            <div class="stat-card bullish">
                <span class="stat-value" th:text="${analysis.bullishIdeaCount()}">0</span>
                <span class="stat-label">Bullish ideas</span>
            </div>
            <div class="stat-card bearish">
                <span class="stat-value" th:text="${analysis.bearishIdeaCount()}">0</span>
                <span class="stat-label">Bearish ideas</span>
            </div>
        </section>

        <!-- Ideas table -->
        <section th:if="${not #lists.isEmpty(analysis.ideas)}">
            <h2>Stock Ideas</h2>
            <table class="ideas-table">
                <thead>
                <tr>
                    <th>Ticker</th>
                    <th>Sentiment</th>
                    <th>Score</th>
                    <th>Tweets</th>
                    <th>Likes</th>
                    <th>Retweets</th>
                    <th>First Seen</th>
                    <th>Last Seen</th>
                    <th>Actions</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="idea : ${analysis.ideas}">
                    <td>
                        <a th:href="@{/stock/{t}(t=${idea.ticker})}" th:text="'$' + ${idea.ticker}">$TICK</a>
                    </td>
                    <td>
                        <span class="badge"
                              th:classappend="${idea.sentiment == T(com.example.twitstock.model.Sentiment).BULLISH} ? 'badge-bull' : (${idea.sentiment == T(com.example.twitstock.model.Sentiment).BEARISH} ? 'badge-bear' : 'badge-neutral')"
                              th:text="${idea.sentiment}">NEUTRAL</span>
                    </td>
                    <td th:text="${#numbers.formatDecimal(idea.score, 1, 3)}">0.000</td>
                    <td th:text="${idea.tweetCount}">0</td>
                    <td th:text="${idea.totalLikes}">0</td>
                    <td th:text="${idea.totalRetweets}">0</td>
                    <td th:text="${idea.firstSeen != null ? #temporals.format(idea.firstSeen, 'yyyy-MM-dd') : '–'}">–</td>
                    <td th:text="${idea.lastSeen  != null ? #temporals.format(idea.lastSeen,  'yyyy-MM-dd') : '–'}">–</td>
                    <td>
                        <a th:href="@{/ticker/{t}/users(t=${idea.ticker})}" class="link-small">All users</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </section>

        <p th:if="${#lists.isEmpty(analysis.ideas)}" class="empty-state">
            No stock ideas detected in the most recent tweets.
        </p>

    </main>

</div>
</body>
</html>
