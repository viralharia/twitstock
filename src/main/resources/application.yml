server:
  port: 8080

spring:
  thymeleaf:
    cache: false          # Disable caching during local development

# ---------------------------------------------------------------------------
# Twitter data provider — twitterapi.io
# ---------------------------------------------------------------------------
twitter:
  scraper:
    # Your twitterapi.io API key.
    # Override via environment variable:  TWITTER_SCRAPER_API_KEY=<your-key>
    api-key: "${TWITTER_SCRAPER_API_KEY:}"

    # Base URL for the twitterapi.io REST API.
    base-url: "https://api.twitterapi.io"

    # Maximum number of pagination pages to fetch per request.
    # Each page returns up to 20 tweets. Raise for longer date windows.
    max-pages: 5

# ---------------------------------------------------------------------------
# Stock price provider — Twelve Data
# ---------------------------------------------------------------------------
twelvedata:
  api:
    # Your Twelve Data API key.
    # Override via environment variable:  TWELVEDATA_API_KEY=<your-key>
    key: "${TWELVEDATA_API_KEY:}"

# ---------------------------------------------------------------------------
# Logging
# ---------------------------------------------------------------------------
logging:
  level:
    com.example.twitstock: DEBUG
